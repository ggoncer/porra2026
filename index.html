<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏆 Porra Mundial 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --green: #00c853;
    --green-dim: #00963e;
    --pitch: #0a1f0d;
    --dark: #0d1117;
    --card: #161b22;
    --border: #21262d;
    --text: #e6edf3;
    --muted: #8b949e;
    --gold: #f0c040;
    --red: #f85149;
    --blue: #58a6ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, var(--pitch) 0%, #0d2b12 50%, var(--pitch) 100%);
    border-bottom: 2px solid var(--green);
    padding: 24px 32px;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    letter-spacing: 3px;
    color: var(--text);
    line-height: 1;
  }

  header h1 span {
    color: var(--green);
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.75rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .ball {
    font-size: 2.5rem;
    animation: spin 8s linear infinite;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* LAYOUT */
  .container {
    max-width: 1600px;
    margin: 0 auto;
    padding: 24px 16px;
  }

  /* CONTROLS */
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 24px;
    align-items: center;
  }

  .search-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    width: 220px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box:focus {
    border-color: var(--green);
  }

  .filter-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    color: var(--muted);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .filter-btn:hover { border-color: var(--green); color: var(--text); }
  .filter-btn.active { background: var(--green); border-color: var(--green); color: #000; font-weight: 600; }

  .participant-filter {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    cursor: pointer;
    outline: none;
  }

  /* PHASE SECTION */
  .phase-section {
    margin-bottom: 32px;
  }

  .phase-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
    padding: 10px 16px;
    background: var(--card);
    border-left: 3px solid var(--green);
    border-radius: 0 8px 8px 0;
  }

  .phase-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 2px;
    color: var(--green);
  }

  .phase-count {
    color: var(--muted);
    font-size: 12px;
  }

  /* TABLE */
  .table-wrapper {
    overflow-x: auto;
    border-radius: 10px;
    border: 1px solid var(--border);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }

  table {
    border-collapse: collapse;
    width: 100%;
    min-width: 900px;
  }

  thead th {
    background: #1a2233;
    padding: 10px 12px;
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
  }

  thead th.partido-col {
    text-align: left;
    min-width: 180px;
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  tbody tr:hover {
    background: rgba(0, 200, 83, 0.04);
  }

  tbody tr:last-child {
    border-bottom: none;
  }

  td {
    padding: 8px 10px;
    text-align: center;
    white-space: nowrap;
  }

  td.match-name {
    text-align: left;
    font-weight: 500;
    color: var(--text);
    padding-left: 14px;
  }

  td.match-name .teams {
    display: block;
  }

  td.match-name .fase-tag {
    display: inline-block;
    font-size: 10px;
    background: rgba(0,200,83,0.15);
    color: var(--green);
    border-radius: 4px;
    padding: 1px 5px;
    margin-top: 2px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  /* BET BADGES */
  .bet {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
  }

  .sign {
    font-weight: 700;
    font-size: 13px;
    padding: 2px 7px;
    border-radius: 4px;
    letter-spacing: 0.5px;
  }

  .sign-1 { background: rgba(88,166,255,0.2); color: #7ec8ff; }
  .sign-X { background: rgba(240,192,64,0.2); color: var(--gold); }
  .sign-2 { background: rgba(248,81,73,0.2); color: #ff8b87; }

  .score {
    font-size: 11px;
    color: var(--muted);
  }

  /* KNOCKOUT: country picks */
  .pick {
    font-size: 12px;
    padding: 3px 8px;
    border-radius: 5px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    color: var(--text);
    white-space: nowrap;
    max-width: 120px;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* MATCH ENTRY: for 1/16 match bets with format team·sign */
  .match-pick {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    max-width: 140px;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* PHASE TABS */
  .tab-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }

  /* STATS */
  .stats-bar {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 20px;
    flex: 1;
    min-width: 140px;
    text-align: center;
  }

  .stat-card .val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    color: var(--green);
    line-height: 1;
  }

  .stat-card .lbl {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 4px;
  }

  /* GROUP TOGGLE */
  .group-letter {
    font-weight: 700;
    color: var(--green);
    font-size: 12px;
  }

  .participant-header {
    font-size: 12px;
    white-space: nowrap;
    padding: 6px 4px !important;
    height: 110px;
    vertical-align: bottom;
    text-align: left;
  }
  .participant-header span {
    display: inline-block;
    writing-mode: vertical-lr;
    transform: rotate(180deg);
    white-space: nowrap;
    text-align: left;
  }

  .participant-header.highlighted {
    color: var(--gold) !important;
    background: rgba(240,192,64,0.1) !important;
  }

  td.highlighted-col {
    background: rgba(240,192,64,0.05);
  }


  .datetime-col {
    min-width: 70px;
    text-align: center;
  }
  .dt-date {
    font-size: 11px;
    color: var(--green);
    font-weight: 600;
    white-space: nowrap;
    display: block;
  }
  .dt-time {
    font-size: 12px;
    color: var(--text);
    font-weight: 700;
    white-space: nowrap;
    display: block;
  }

  /* TODAY VIEW */
  .today-header-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
  }
  .today-date-big {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    color: var(--text);
    letter-spacing: 3px;
  }
  .today-count {
    background: var(--green);
    color: #000;
    font-weight: 700;
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .today-match-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 28px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  .today-match-header {
    background: linear-gradient(135deg, #0d2b12 0%, #162b1a 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .today-match-teams {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .team-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 2px;
    color: var(--text);
  }
  .vs-badge {
    background: var(--green);
    color: #000;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    padding: 2px 10px;
    border-radius: 6px;
    letter-spacing: 2px;
  }
  .today-match-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .today-time {
    font-size: 13px;
    color: var(--gold);
    font-weight: 600;
  }
  .results-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 0;
    padding: 0;
  }
  .result-col {
    flex: 1;
    min-width: 140px;
    padding: 20px 20px 24px;
    border-right: 1px solid var(--border);
    text-align: center;
  }
  .result-col:last-child { border-right: none; }
  .result-top {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 6px;
  }
  .result-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    color: var(--text);
    letter-spacing: 2px;
  }
  .result-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .result-count {
    font-size: 12px;
    font-weight: 700;
    color: var(--green);
    margin-bottom: 12px;
  }
  .bettor-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
  }
  .bettor-name {
    background: rgba(255,255,255,0.07);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 11px;
    color: var(--text);
    white-space: nowrap;
  }
  .today-empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }
  .today-empty-icon { font-size: 4rem; margin-bottom: 16px; }
  .today-empty-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 2px; color: var(--text); margin-bottom: 8px; }
  .today-empty-sub { font-size: 14px; }


  /* RESULT COLUMN */
  .result-col-header {
    min-width: 80px;
    text-align: center;
  }
  .result-cell {
    text-align: center;
    min-width: 80px;
  }
  .score-badge {
    display: inline-block;
    background: rgba(0,200,83,0.15);
    border: 1px solid var(--green);
    border-radius: 6px;
    padding: 3px 10px;
    font-weight: 700;
    font-size: 14px;
    color: var(--text);
    letter-spacing: 1px;
    white-space: nowrap;
  }
  .score-pending {
    color: var(--muted);
    font-size: 12px;
  }
  .score-loading {
    color: var(--muted);
    font-size: 11px;
    font-style: italic;
  }

  /* BET CORRECT */
  .bet-correct .sign {
    border: 2px solid #fff !important;
    color: #fff !important;
    font-weight: 800 !important;
    box-shadow: 0 0 6px rgba(255,255,255,0.4);
  }
  .bet-correct .score {
    color: var(--muted);
  }
  /* BET EXACT - acertó resultado exacto */
  .bet-exact .sign {
    border: 2px solid #fff !important;
    color: #fff !important;
    font-weight: 800 !important;
    box-shadow: 0 0 6px rgba(255,255,255,0.4);
  }
  .bet-exact .score {
    color: #fff !important;
    font-weight: 700 !important;
  }


  /* RANKING */
  .ranking-table-wrap {
    overflow-x: auto;
    border-radius: 10px;
    border: 1px solid var(--border);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  .ranking-table {
    border-collapse: collapse;
    width: 100%;
  }
  .ranking-table thead th {
    background: #1a2233;
    padding: 10px 14px;
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .ranking-table thead th.left { text-align: left; }
  .ranking-table tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  .ranking-table tbody tr:hover { background: rgba(0,200,83,0.04); }
  .ranking-table tbody tr:last-child { border-bottom: none; }
  .ranking-table td {
    padding: 10px 14px;
    text-align: center;
    font-size: 13px;
    white-space: nowrap;
  }
  .ranking-table td.left { text-align: left; }
  .rank-pos {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    color: var(--muted);
    width: 40px;
  }
  .rank-pos.gold   { color: #f0c040; }
  .rank-pos.silver { color: #c0c0c0; }
  .rank-pos.bronze { color: #cd7f32; }
  .rank-name {
    font-weight: 600;
    color: var(--text);
    text-align: left;
  }
  .rank-pts {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    color: var(--green);
  }
  .rank-sub {
    font-size: 11px;
    color: var(--muted);
  }
  .rank-breakdown {
    font-size: 11px;
    color: var(--muted);
    text-align: left;
  }
  .ranking-legend {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 20px;
    font-size: 12px;
    color: var(--muted);
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }
  .ranking-legend span { white-space: nowrap; }
  .ranking-legend b { color: var(--text); }


  /* APUESTAS ESPECIALES */
  .apuestas-section {
    margin-bottom: 32px;
  }
  .apuestas-section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 2px;
    color: var(--green);
    padding: 10px 16px;
    background: var(--card);
    border-left: 3px solid var(--green);
    border-radius: 0 8px 8px 0;
    margin-bottom: 12px;
  }
  .apuestas-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
  }
  .apuesta-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    text-align: center;
  }
  .apuesta-card .ap-name {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .apuesta-card .ap-value {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }
  .apuesta-card .ap-value.correct {
    color: var(--green);
    font-weight: 800;
  }
  .apuesta-card .ap-value.wrong {
    color: var(--muted);
    opacity: 0.5;
  }
  .pos-table-wrap {
    overflow-x: auto;
    border-radius: 10px;
    border: 1px solid var(--border);
  }
  .pos-table {
    border-collapse: collapse;
    width: 100%;
    min-width: 600px;
  }
  .pos-table thead th {
    background: #1a2233;
    padding: 8px 12px;
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .pos-table thead th.left { text-align: left; }
  .pos-table tbody tr { border-bottom: 1px solid var(--border); }
  .pos-table tbody tr:last-child { border-bottom: none; }
  .pos-table td {
    padding: 7px 10px;
    text-align: center;
    font-size: 12px;
    white-space: nowrap;
  }
  .pos-table td.left { text-align: left; font-weight: 600; }
  .pos-chip {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 5px;
    font-size: 11px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
  }
  .pos-chip.correct {
    background: rgba(0,200,83,0.2);
    border-color: var(--green);
    color: var(--green);
    font-weight: 700;
  }
  .pos-chip.wrong {
    opacity: 0.35;
  }

  /* LÍDERES DE LA JORNADA */
  .leaders-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 24px;
    margin-bottom: 28px;
  }
  .leaders-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 2px;
    color: var(--gold);
    margin-bottom: 4px;
  }
  .leaders-subtitle {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 16px;
  }
  .leaders-grid {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .leader-card {
    flex: 1;
    min-width: 130px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    text-align: center;
  }
  .leader-medal {
    font-size: 1.8rem;
    margin-bottom: 6px;
  }
  .leader-name {
    font-weight: 700;
    font-size: 13px;
    color: var(--text);
    margin-bottom: 6px;
  }
  .leader-pts {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    color: var(--green);
    line-height: 1;
  }
  .leader-pts-label {
    font-size: 0.9rem;
    color: var(--muted);
  }
  .leader-detail {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* HIDDEN */
  .hidden { display: none !important; }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    header { padding: 16px; flex-wrap: wrap; }
    header h1 { font-size: 1.8rem; }
    .controls { gap: 8px; }
  }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 24px;
    color: var(--muted);
    font-size: 12px;
    border-top: 1px solid var(--border);
    margin-top: 40px;
  }
</style>
</head>
<body>

<header>
  <div class="ball">⚽</div>
  <div>
    <h1>PORRA MUNDIAL <span>2026</span></h1>
    <div class="subtitle">Apuestas de los participantes · 23 porredores</div>
  </div>
</header>

<div class="container">

  <!-- STATS -->
  <div class="stats-bar" id="statsBar" style="display:none"></div>

  <!-- CONTROLS -->
  <div class="controls">
    <div id="phaseFilters" style="display:flex;flex-wrap:wrap;gap:8px;"></div>
  </div>

  <div id="content"></div>

</div>

<footer>
  PORRA MUNDIAL 2026 · Generado automáticamente desde el Excel de apuestas

function sortByTime(matches) {
  return matches.slice().sort((a, b) => {
    const [ha, ma] = (SCHEDULE[a.partido]?.[1] || '99:99').split(':').map(Number);
    const [hb, mb] = (SCHEDULE[b.partido]?.[1] || '99:99').split(':').map(Number);
    const ta = ha < 10 ? ha + 24 : ha;
    const tb = hb < 10 ? hb + 24 : hb;
    return (ta * 60 + ma) - (tb * 60 + mb);
  });
}

function renderToday() {
  const now = new Date();
  // Window: from 08:00 today to 05:00 next day
  const windowStart = new Date(now);
  windowStart.setHours(12, 0, 0, 0);
  const windowEnd = new Date(now);
  windowEnd.setDate(windowEnd.getDate() + 1);
  windowEnd.setHours(7, 59, 0, 0);

  if (now < windowStart) {
    windowStart.setDate(windowStart.getDate() - 1);
    windowEnd.setDate(windowEnd.getDate() - 1);
  }

  const startKey = dateKey(windowStart);
  const endKey = dateKey(windowEnd);  // may be same or next day

  // Find all group matches within window
  const todayMatches = MATCHES.filter(m => {
    const sched = SCHEDULE[m.partido];
    if (!sched) return false;
    const [dayStr, hora] = [sched[0], sched[1]];
    const [h, min] = hora.split(':').map(Number);
    // Reconstruct match datetime (assume year 2026, June)
    const monthMap = {ene:0,feb:1,mar:2,abr:3,may:4,jun:5,jul:6,ago:7,sep:8,oct:9,nov:10,dic:11};
    const parts = dayStr.split(' ');
    const matchDay = parseInt(parts[0]);
    const matchMonth = monthMap[parts[1]] ?? 5;
    const matchDate = new Date(2026, matchMonth, matchDay, h, min, 0);
    return matchDate >= windowStart && matchDate < windowEnd;
  });

  const todayKey = dateKey(now < new Date(new Date().setHours(8,0,0,0)) 
    ? new Date(now.getTime() - 86400000) : now);

  if (todayMatches.length === 0) {
    return `
      <div class="today-empty">
        <div class="today-empty-icon">📅</div>
        <div class="today-empty-title">No hay partidos hoy</div>
        <div class="today-empty-sub">Hoy es ${todayKey}. Los partidos del Mundial van del 11 de junio al 27 de junio.</div>
      </div>`;
  }

  let html = `<div class="today-header-bar"><span class="today-date-big">📅 ${todayKey.toUpperCase()}</span><span class="today-count">${todayMatches.length} partido${todayMatches.length > 1 ? 's' : ''} hoy</span></div>`;

  // --- LÍDERES DE LA JORNADA ---
  const playedToday = todayMatches.filter(m => RESULTS_CACHE[m.partido]);
  if (playedToday.length > 0) {
    const dayScores = {};
    PARTICIPANTS.forEach(p => dayScores[p] = { total: 0, sign: 0, exact: 0 });

    playedToday.forEach(m => {
      const actual = RESULTS_CACHE[m.partido];
      const [g1, g2] = actual.split('-').map(Number);
      const actualSign = g1 > g2 ? '1' : g1 < g2 ? '2' : 'X';
      PARTICIPANTS.forEach(p => {
        const val = m.bets[p] || '';
        if (!val || val === 'nan') return;
        const b = parseBet(val);
        if (!b || !b.sign) return;
        if (b.sign === actualSign) {
          dayScores[p].sign++;
          dayScores[p].total += 1;
          if (b.score === actual) {
            dayScores[p].exact++;
            dayScores[p].total += 2;
          }
        }
      });
    });

    const top3 = PARTICIPANTS
      .map(p => ({ name: p, ...dayScores[p] }))
      .filter(p => p.total > 0)
      .sort((a, b) => b.total - a.total || b.exact - a.exact || a.name.localeCompare(b.name))
      .slice(0, 3);

    if (top3.length > 0) {
      const medals = ['🥇', '🥈', '🥉'];
      const cards = top3.map((p, i) => `
        <div class="leader-card">
          <div class="leader-medal">${medals[i]}</div>
          <div class="leader-name">${p.name}</div>
          <div class="leader-pts">${p.total} <span class="leader-pts-label">pts</span></div>
        </div>`).join('');

      html += `
        <div class="leaders-section">
          <div class="leaders-title">🏆 Líderes de la Jornada</div>
          <div class="leaders-subtitle">${playedToday.length} partido${playedToday.length > 1 ? 's' : ''} finalizado${playedToday.length > 1 ? 's' : ''}</div>
          <div class="leaders-grid">${cards}</div>
        </div>`;
    }
  }

  sortByTime(todayMatches).forEach(match => {
    const sched = SCHEDULE[match.partido];
    const [team1raw, team2raw] = match.partido.split('-');
    const team1 = team1raw.trim();
    const team2 = team2raw.trim();

    // Aggregate bets: group by sign|score
    const byResult = {};
    PARTICIPANTS.forEach(p => {
      const val = match.bets[p] || '';
      if (!val || val === 'nan') return;
      if (!byResult[val]) byResult[val] = [];
      byResult[val].push(p);
    });

    // Sort: 1 bets first, then X, then 2
    const order = {'1': 0, 'X': 1, '2': 2};
    const sorted = Object.entries(byResult).sort(([a], [b]) => {
      const sa = a.split('|')[0]; const sb = b.split('|')[0];
      return (order[sa] ?? 9) - (order[sb] ?? 9);
    });

    const resultCols = sorted.map(([bet, players]) => {
      const [sign, score] = bet.split('|');
      const signClass = `sign-${sign}`;
      const label = sign === '1' ? team1 : sign === '2' ? team2 : 'Empate';
      const avatars = players.map(p => `<span class="avatar" title="${p}">${p.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}</span>`).join('');
      const names = players.map(p => `<span class="bettor-name">${p}</span>`).join('');
      return `
        <div class="result-col">
          <div class="result-top">
            <span class="sign ${signClass}">${sign}</span>
            <span class="result-score">${score || ''}</span>
          </div>
          <div class="result-label">${label}</div>
          <div class="result-count">${players.length} porredor${players.length > 1 ? 'es' : ''}</div>
          <div class="bettor-list">${names}</div>
        </div>`;
    }).join('');

    html += `
      <div class="today-match-card">
        <div class="today-match-header">
          <div class="today-match-teams">
            <span class="team-name">${flag(team1)} ${team1}</span>
            <span class="vs-badge">VS</span>
            <span class="team-name">${team2} ${flag(team2)}</span>
          </div>
          <div class="today-match-meta">
            <span class="today-time">🕐 ${sched[1]} (hora española)</span>
            <span class="fase-tag">Grupo ${match.fase[0]}</span>
          </div>
        </div>
        <div class="results-grid">${resultCols}</div>
      </div>`;
  });

  return html;
}

    });

    const order = {'1': 0, 'X': 1, '2': 2};
    const sorted = Object.entries(byResult).sort(([a], [b]) => {
      const sa = a.split('|')[0]; const sb = b.split('|')[0];
      return (order[sa] ?? 9) - (order[sb] ?? 9);
    });

    const resultCols = sorted.map(([bet, players]) => {
      const [sign, score] = bet.split('|');
      const label = sign === '1' ? team1 : sign === '2' ? team2 : 'Empate';
      const names = players.map(p => `<span class="bettor-name">${p}</span>`).join('');
      return `
        <div class="result-col">
          <div class="result-top">
            <span class="sign sign-${sign}">${sign}</span>
            <span class="result-score">${score || ''}</span>
          </div>
          <div class="result-label">${label}</div>
          <div class="result-count">${players.length} porredor${players.length > 1 ? 'es' : ''}</div>
          <div class="bettor-list">${names}</div>
        </div>`;
    }).join('');

    html += `
      <div class="today-match-card">
        <div class="today-match-header">
          <div class="today-match-teams">
            <span class="team-name">${flag(team1)} ${team1}</span>
            <span class="vs-badge">VS</span>
            <span class="team-name">${team2} ${flag(team2)}</span>
          </div>
          <div class="today-match-meta">
            <span class="today-time">🕐 ${sched[1]} (hora española)</span>
            <span class="fase-tag">Grupo ${match.fase[0]}</span>
          </div>
        </div>
        <div class="results-grid">${resultCols}</div>
      </div>`;
  });

  return html;
}

async function loadResults() {
  try {
    const res = await fetch('/api/results');
    if (!res.ok) return;
    const data = await res.json();
    (data.matches || []).forEach(m => {
      const h = FD_TEAM_MAP[m.homeTeam.name] || m.homeTeam.name;
      const a = FD_TEAM_MAP[m.awayTeam.name] || m.awayTeam.name;
      const gh = m.score.fullTime.home;
      const ga = m.score.fullTime.away;
      if (gh === null || ga === null) return;
      RESULTS_CACHE[`${h}-${a}`] = `${gh}-${ga}`;
    });
  } catch(e) {
    console.warn('Results fetch failed:', e);
  }
}

function isMatchPlayed(partido) {
  return !!RESULTS_CACHE[partido];
}

function updateResultCells() {
  document.querySelectorAll('[data-result-partido]').forEach(el => {
    const partido = el.getAttribute('data-result-partido');
    if (!isMatchPlayed(partido)) {
      el.innerHTML = '<span class="score-pending">—</span>';
      return;
    }
    const score = RESULTS_CACHE[partido];
    el.innerHTML = score
      ? `<span class="score-badge">${score}</span>`
      : '<span class="score-pending">?</span>';
  });
}

async function refreshResults() {
  const btn = document.getElementById('refreshBtn');
  if (btn) { btn.textContent = '⏳ Cargando...'; btn.disabled = true; }
  await loadResults();
  updateResultCells();
  if (btn) {
    btn.textContent = '✅ Actualizado';
    btn.disabled = false;
    setTimeout(() => { btn.textContent = '🔄 Actualizar resultados'; }, 3000);
  }
}

function calcRanking() {
  const groupMatches = MATCHES.filter(m => GROUP_FASES.has(m.fase));
  const scores = {};
  PARTICIPANTS.forEach(p => {
    scores[p] = { total: 0, sign: 0, exact: 0, played: 0, pos: 0, special: 0 };
  });

  // 1) Resultados fase de grupos (1X2 + exacto)
  groupMatches.forEach(m => {
    const actual = RESULTS_CACHE[m.partido];
    if (!actual) return;
    const [g1, g2] = actual.split('-').map(Number);
    const actualSign = g1 > g2 ? '1' : g1 < g2 ? '2' : 'X';
    PARTICIPANTS.forEach(p => {
      const val = m.bets[p] || '';
      if (!val || val === 'nan') return;
      const b = parseBet(val);
      if (!b || !b.sign) return;
      scores[p].played++;
      if (b.sign === actualSign) {
        scores[p].sign++;
        scores[p].total += POINTS.sign;
        if (b.score === actual) {
          scores[p].exact++;
          scores[p].total += POINTS.exact;
        }
      }
    });
  });

  // 2) Posiciones de grupo (se evalúan al terminar cada grupo)
  // GROUP_STANDINGS: define las posiciones reales cuando se conozcan
  if (typeof GROUP_STANDINGS !== 'undefined') {
    PARTICIPANTS.forEach(p => {
      const bets = POSITION_BETS[p] || {};
      Object.entries(bets).forEach(([slot, team]) => {
        const actual = GROUP_STANDINGS[slot];
        if (!actual) return;
        if (actual === team) {
          const posNum = parseInt(slot[0]);
          scores[p].pos++;
          scores[p].total += POINTS['pos' + posNum] || 2;
        }
      });
    });
  }

  // 3) Apuestas especiales (campeón, subcampeón, etc.)
  if (typeof SPECIAL_RESULTS !== 'undefined') {
    PARTICIPANTS.forEach(p => {
      const bets = SPECIAL_BETS[p] || {};
      Object.entries(SPECIAL_RESULTS).forEach(([key, actual]) => {
        if (!actual) return;
        const bet = bets[key];
        if (!bet) return;
        // Normalize for comparison (case insensitive, trim)
        if (bet.trim().toLowerCase() === actual.trim().toLowerCase()) {
          scores[p].special++;
          scores[p].total += POINTS[key] || 0;
        }
      });
    });
  }

  return scores;
}

function renderRanking() {
  const scores = calcRanking();
  const sorted = PARTICIPANTS
    .map(p => ({ name: p, ...scores[p] }))
    .sort((a, b) => b.total - a.total || b.exact - a.exact || b.sign - a.sign);

  const playedMatches = MATCHES.filter(m => GROUP_FASES.has(m.fase) && RESULTS_CACHE[m.partido] && isMatchPlayed(m.partido)).length;

  let html = `
    <div class="ranking-legend">
      <span>⚽ <b>Partidos jugados:</b> ${playedMatches} de 36</span>
      <span>✅ <b>1X2:</b> +1 pto</span>
      <span>🎯 <b>Exacto:</b> +2 extra</span>
      <span>📊 <b>Posición grupo:</b> +2 ptos</span>
      <span>🏆 <b>Campeón:</b> +25 ptos</span>
    </div>
    <div class="ranking-table-wrap">
      <table class="ranking-table">
        <thead>
          <tr>
            <th class="rank-pos">#</th>
            <th class="left">Porredor</th>
            <th>Total</th>
            <th>1X2 ✅</th>
            <th>Exactos 🎯</th>
            <th>Posic. 📊</th>
            <th>Especial 🏆</th>
          </tr>
        </thead>
        <tbody>`;

  sorted.forEach((p, i) => {
    const pos = i + 1;
    const posClass = pos === 1 ? 'gold' : pos === 2 ? 'silver' : pos === 3 ? 'bronze' : '';
    const medal = pos === 1 ? '🥇' : pos === 2 ? '🥈' : pos === 3 ? '🥉' : '';
    html += `
          <tr>
            <td class="rank-pos ${posClass}">${medal || pos}</td>
            <td class="rank-name">${p.name}</td>
            <td class="rank-pts">${p.total}</td>
            <td>${p.sign}</td>
            <td>${p.exact}</td>
            <td>${p.pos}</td>
            <td>${p.special}</td>
          </tr>`;
  });

  html += `</tbody></table></div>`;
  return html;
}


function buildStats() {
  const sb = document.getElementById('statsBar');
  const groupMatches = MATCHES.filter(m => GROUP_FASES.has(m.fase)).length;
  sb.innerHTML = `
    <div class="stat-card"><div class="val">${PARTICIPANTS.length}</div><div class="lbl">Porredores</div></div>
    <div class="stat-card"><div class="val">${groupMatches}</div><div class="lbl">Partidos de grupos</div></div>
    <div class="stat-card"><div class="val">${Object.keys(groups).length}</div><div class="lbl">Grupos</div></div>
    <div class="stat-card"><div class="val">${knockoutMatches1_16.length + knockoutMatches1_8.length}</div><div class="lbl">Partidos eliminatorias</div></div>
  `;
}

function parseBet(val) {
  // Format: "1|2-1", "X|1-1", "2|0-2" or for knockout "TeamName·1|2-0" or just "TeamName"
  if (!val || val === 'nan') return null;
  if (val.includes('·')) {
    const [teams, bet] = val.split('·');
    const parts = bet.split('|');
    return { isMatch: true, teams, sign: parts[0], score: parts[1] || '' };
  }
  if (val.includes('|')) {
    const parts = val.split('|');
    return { sign: parts[0], score: parts[1] || '' };
  }
  // Just a team name (qualifier picks)
  return { team: val };
}

function getActualSign(partido) {
  const score = RESULTS_CACHE[partido];
  if (!score || !isMatchPlayed(partido)) return null;
  const [g1, g2] = score.split('-').map(Number);
  if (g1 > g2) return '1';
  if (g1 < g2) return '2';
  return 'X';
}

function renderBet(val, type, partido) {
  const b = parseBet(val);
  if (!b) return '<td></td>';
  
  if (b.team) {
    return `<td><span class="pick" title="${b.team}">${b.team}</span></td>`;
  }
  if (b.isMatch) {
    return `<td><div class="match-pick" title="${b.teams} ${b.sign}|${b.score}">${b.teams}<br><span class="sign sign-${b.sign}">${b.sign}</span> ${b.score}</div></td>`;
  }
  const actualSign = partido ? getActualSign(partido) : null;
  const actualScore = partido ? RESULTS_CACHE[partido] : null;
  const isExact = actualScore && isMatchPlayed(partido) && b.score === actualScore;
  const isCorrect = actualSign && b.sign === actualSign;
  const cls = isExact ? ' bet-exact' : isCorrect ? ' bet-correct' : '';
  return `<td><div class="bet${cls}"><span class="sign sign-${b.sign}">${b.sign}</span><span class="score">${b.score}</span></div></td>`;
}

function shortName(p) {
  const words = p.trim().split(/\s+/);
  if (words.length >= 2 && words[0].length > 2 && words[1].length > 2) {
    return words[0] + ' ' + words[1][0] + '.';
  }
  return p;
}

function buildTable(matches, title, faseLabel, isKnockout, isGroupMatch=false) {
  const filtered = searchTerm
    ? matches.filter(m => m.partido.toLowerCase().includes(searchTerm))
    : matches;
  
  if (filtered.length === 0) return '';

  const colClass = p => p === highlightedParticipant ? ' class="participant-header highlighted"' : ' class="participant-header"';
  const tdClass = p => p === highlightedParticipant ? ' class="highlighted-col"' : '';

  const headers = PARTICIPANTS.map(p => `<th${colClass(p)}><span>${shortName(p)}</span></th>`).join('');
  const dateHeader = (isGroupMatch) ? '<th class="datetime-col">Fecha<br>Hora (ES)</th>' : '';
  const resultHeader = (isGroupMatch) ? '<th class="result-col-header">Resultado</th>' : '';
  
  const rows = filtered.map(m => {
    const bets = PARTICIPANTS.map(p => renderBet(m.bets[p] || '', isKnockout, isGroupMatch ? m.partido : null)).join('');
    const sched = SCHEDULE[m.partido];
    const dtCell = (isGroupMatch && sched)
      ? `<td class="datetime-col"><span class="dt-date">${sched[0]}</span><span class="dt-time">${sched[1]}</span></td>`
      : (isGroupMatch ? '<td class="datetime-col"><span class="dt-date">—</span></td>' : '');
    const resultCell = isGroupMatch
      ? `<td class="result-cell" data-result-partido="${m.partido}"><span class="score-loading">...</span></td>`
      : '';
    return `
      <tr>
        <td class="match-name">
          <span class="teams">${m.partido}</span>
          ${faseLabel ? `<span class="fase-tag">${m.fase}</span>` : ''}
        </td>
        ${dtCell}
        ${resultCell}
        ${bets}
      </tr>`;
  }).join('');

  return `
    <div class="phase-section">
      ${title ? `<div class="phase-header"><span class="phase-label">${title}</span><span class="phase-count">${filtered.length} partidos</span></div>` : ''}
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th class="partido-col">Partido</th>
              ${dateHeader}
              ${resultHeader}
              ${headers}
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

function buildGroupTabs() {
  const grpLetters = Object.keys(groups).sort();
  let html = '<div class="tab-row">';
  grpLetters.forEach(g => {
    html += `<button class="filter-btn${activeGroup === g ? ' active' : ''}" onclick="setGroup('${g}')">${g}</button>`;
  });
  html += '</div>';
  return html;
}

window.setGroup = function(g) {
  activeGroup = g;
  render();
};

function render() {
  buildPhaseFilters();
  const content = document.getElementById('content');
  setTimeout(updateResultCells, 50);

  if (activePhase === 'groups') {
    const grpLetters = Object.keys(groups).sort();
    let html = buildGroupTabs();

    if (searchTerm) {
      // Show all groups filtered
      grpLetters.forEach(g => {
        html += buildTable(groups[g], `Grupo ${g}`, false, false, true);
      });
    } else {
      html += buildTable(groups[activeGroup] || [], `Grupo ${activeGroup}`, false, false, true);
    }
    content.innerHTML = html;
  } else if (activePhase === '1/16') {
    let html = '';
    if (picks1_16.length > 0) {
      html += buildTable(picks1_16, '🎯 Pronóstico de clasificados (32 puestos)', true, false);
    }
    if (knockoutMatches1_16.length > 0) {
      html += buildTable(knockoutMatches1_16, '⚔️ Partidos de dieciseisavos', true, true);
    }
    content.innerHTML = html;
  } else if (activePhase === 'today') {
    content.innerHTML = renderToday();
  } else if (activePhase === 'tomorrow') {
    content.innerHTML = renderTomorrow();
  } else if (activePhase === 'ranking') {
    content.innerHTML = renderRanking();
  } else if (activePhase === 'apuestas') {
    content.innerHTML = renderApuestas();
  } else if (activePhase === '1/8') {
    let html = '';
    if (picks1_8.length > 0) {
      html += buildTable(picks1_8, '🎯 Pronóstico de octavofinalistas (16 puestos)', true, false);
    }
    if (knockoutMatches1_8.length > 0) {
      html += buildTable(knockoutMatches1_8, '⚔️ Partidos de octavos de final', true, true);
    }
    content.innerHTML = html;
  }
}

buildStats();
render();
updateResultCells();
loadResults().then(() => {
  updateResultCells();
  // Re-render si estamos en partidos de hoy o mañana para actualizar líderes
  if (activePhase === 'today' || activePhase === 'tomorrow') {
    render();
  }
});
</script>
