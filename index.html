<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏆 Porra Mundial 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --green: #00c853;
    --green-dim: #00963e;
    --pitch: #0a1f0d;
    --dark: #0d1117;
    --card: #161b22;
    --border: #21262d;
    --text: #e6edf3;
    --muted: #8b949e;
    --gold: #f0c040;
    --red: #f85149;
    --blue: #58a6ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, var(--pitch) 0%, #0d2b12 50%, var(--pitch) 100%);
    border-bottom: 2px solid var(--green);
    padding: 24px 32px;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    letter-spacing: 3px;
    color: var(--text);
    line-height: 1;
  }

  header h1 span {
    color: var(--green);
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.75rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .ball {
    font-size: 2.5rem;
    animation: spin 8s linear infinite;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* LAYOUT */
  .container {
    max-width: 1600px;
    margin: 0 auto;
    padding: 24px 16px;
  }

  /* CONTROLS */
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 24px;
    align-items: center;
  }

  .search-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    width: 220px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box:focus {
    border-color: var(--green);
  }

  .filter-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    color: var(--muted);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .filter-btn:hover { border-color: var(--green); color: var(--text); }
  .filter-btn.active { background: var(--green); border-color: var(--green); color: #000; font-weight: 600; }

  .participant-filter {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    cursor: pointer;
    outline: none;
  }

  /* PHASE SECTION */
  .phase-section {
    margin-bottom: 32px;
  }

  .phase-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
    padding: 10px 16px;
    background: var(--card);
    border-left: 3px solid var(--green);
    border-radius: 0 8px 8px 0;
  }

  .phase-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 2px;
    color: var(--green);
  }

  .phase-count {
    color: var(--muted);
    font-size: 12px;
  }

  /* TABLE */
  .table-wrapper {
    overflow-x: auto;
    border-radius: 10px;
    border: 1px solid var(--border);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }

  table {
    border-collapse: collapse;
    width: 100%;
    min-width: 900px;
  }

  thead th {
    background: #1a2233;
    padding: 10px 12px;
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
  }

  thead th.partido-col {
    text-align: left;
    min-width: 180px;
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  tbody tr:hover {
    background: rgba(0, 200, 83, 0.04);
  }

  tbody tr:last-child {
    border-bottom: none;
  }

  td {
    padding: 8px 10px;
    text-align: center;
    white-space: nowrap;
  }

  td.match-name {
    text-align: left;
    font-weight: 500;
    color: var(--text);
    padding-left: 14px;
  }

  td.match-name .teams {
    display: block;
  }

  td.match-name .fase-tag {
    display: inline-block;
    font-size: 10px;
    background: rgba(0,200,83,0.15);
    color: var(--green);
    border-radius: 4px;
    padding: 1px 5px;
    margin-top: 2px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  /* BET BADGES */
  .bet {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
  }

  .sign {
    font-weight: 700;
    font-size: 13px;
    padding: 2px 7px;
    border-radius: 4px;
    letter-spacing: 0.5px;
  }

  .sign-1 { background: rgba(88,166,255,0.2); color: #7ec8ff; }
  .sign-X { background: rgba(240,192,64,0.2); color: var(--gold); }
  .sign-2 { background: rgba(248,81,73,0.2); color: #ff8b87; }

  .score {
    font-size: 11px;
    color: var(--muted);
  }

  /* KNOCKOUT: country picks */
  .pick {
    font-size: 12px;
    padding: 3px 8px;
    border-radius: 5px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    color: var(--text);
    white-space: nowrap;
    max-width: 120px;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* MATCH ENTRY: for 1/16 match bets with format team·sign */
  .match-pick {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    max-width: 140px;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* PHASE TABS */
  .tab-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }

  /* STATS */
  .stats-bar {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 20px;
    flex: 1;
    min-width: 140px;
    text-align: center;
  }

  .stat-card .val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    color: var(--green);
    line-height: 1;
  }

  .stat-card .lbl {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 4px;
  }

  /* GROUP TOGGLE */
  .group-letter {
    font-weight: 700;
    color: var(--green);
    font-size: 12px;
  }

  .participant-header {
    font-size: 12px;
    white-space: nowrap;
    padding: 6px 4px !important;
    height: 110px;
    vertical-align: bottom;
    text-align: left;
  }
  .participant-header span {
    display: inline-block;
    writing-mode: vertical-lr;
    transform: rotate(180deg);
    white-space: nowrap;
    text-align: left;
  }

  .participant-header.highlighted {
    color: var(--gold) !important;
    background: rgba(240,192,64,0.1) !important;
  }

  td.highlighted-col {
    background: rgba(240,192,64,0.05);
  }


  .datetime-col {
    min-width: 70px;
    text-align: center;
  }
  .dt-date {
    font-size: 11px;
    color: var(--green);
    font-weight: 600;
    white-space: nowrap;
    display: block;
  }
  .dt-time {
    font-size: 12px;
    color: var(--text);
    font-weight: 700;
    white-space: nowrap;
    display: block;
  }

  /* TODAY VIEW */
  .today-header-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
  }
  .today-date-big {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    color: var(--text);
    letter-spacing: 3px;
  }
  .today-count {
    background: var(--green);
    color: #000;
    font-weight: 700;
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .today-match-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 28px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  .today-match-header {
    background: linear-gradient(135deg, #0d2b12 0%, #162b1a 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .today-match-teams {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .team-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 2px;
    color: var(--text);
  }
  .vs-badge {
    background: var(--green);
    color: #000;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    padding: 2px 10px;
    border-radius: 6px;
    letter-spacing: 2px;
  }
  .today-match-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .today-time {
    font-size: 13px;
    color: var(--gold);
    font-weight: 600;
  }
  .results-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 0;
    padding: 0;
  }
  .result-col {
    flex: 1;
    min-width: 140px;
    padding: 20px 20px 24px;
    border-right: 1px solid var(--border);
    text-align: center;
  }
  .result-col:last-child { border-right: none; }
  .result-top {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 6px;
  }
  .result-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    color: var(--text);
    letter-spacing: 2px;
  }
  .result-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .result-count {
    font-size: 12px;
    font-weight: 700;
    color: var(--green);
    margin-bottom: 12px;
  }
  .bettor-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
  }
  .bettor-name {
    background: rgba(255,255,255,0.07);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 11px;
    color: var(--text);
    white-space: nowrap;
  }
  .today-empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }
  .today-empty-icon { font-size: 4rem; margin-bottom: 16px; }
  .today-empty-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 2px; color: var(--text); margin-bottom: 8px; }
  .today-empty-sub { font-size: 14px; }


  /* RESULT COLUMN */
  .result-col-header {
    min-width: 80px;
    text-align: center;
  }
  .result-cell {
    text-align: center;
    min-width: 80px;
  }
  .score-badge {
    display: inline-block;
    background: rgba(0,200,83,0.15);
    border: 1px solid var(--green);
    border-radius: 6px;
    padding: 3px 10px;
    font-weight: 700;
    font-size: 14px;
    color: var(--text);
    letter-spacing: 1px;
    white-space: nowrap;
  }
  .score-pending {
    color: var(--muted);
    font-size: 12px;
  }
  .score-loading {
    color: var(--muted);
    font-size: 11px;
    font-style: italic;
  }

  /* BET CORRECT */
  .bet-correct .sign {
    border: 2px solid #fff !important;
    color: #fff !important;
    font-weight: 800 !important;
    box-shadow: 0 0 6px rgba(255,255,255,0.4);
  }
  .bet-correct .score {
    color: var(--muted);
  }
  /* BET EXACT - acertó resultado exacto */
  .bet-exact .sign {
    border: 2px solid #fff !important;
    color: #fff !important;
    font-weight: 800 !important;
    box-shadow: 0 0 6px rgba(255,255,255,0.4);
  }
  .bet-exact .score {
    color: #fff !important;
    font-weight: 700 !important;
  }


  /* RANKING */
  .ranking-table-wrap {
    overflow-x: auto;
    border-radius: 10px;
    border: 1px solid var(--border);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  .ranking-table {
    border-collapse: collapse;
    width: 100%;
  }
  .ranking-table thead th {
    background: #1a2233;
    padding: 10px 14px;
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .ranking-table thead th.left { text-align: left; }
  .ranking-table tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  .ranking-table tbody tr:hover { background: rgba(0,200,83,0.04); }
  .ranking-table tbody tr:last-child { border-bottom: none; }
  .ranking-table td {
    padding: 10px 14px;
    text-align: center;
    font-size: 13px;
    white-space: nowrap;
  }
  .ranking-table td.left { text-align: left; }
  .rank-pos {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    color: var(--muted);
    width: 40px;
  }
  .rank-pos.gold   { color: #f0c040; }
  .rank-pos.silver { color: #c0c0c0; }
  .rank-pos.bronze { color: #cd7f32; }
  .rank-name {
    font-weight: 600;
    color: var(--text);
    text-align: left;
  }
  .rank-pts {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    color: var(--green);
  }
  .rank-sub {
    font-size: 11px;
    color: var(--muted);
  }
  .rank-breakdown {
    font-size: 11px;
    color: var(--muted);
    text-align: left;
  }
  .ranking-legend {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 20px;
    font-size: 12px;
    color: var(--muted);
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }
  .ranking-legend span { white-space: nowrap; }
  .ranking-legend b { color: var(--text); }


  /* APUESTAS ESPECIALES */
  .apuestas-section {
    margin-bottom: 32px;
  }
  .apuestas-section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 2px;
    color: var(--green);
    padding: 10px 16px;
    background: var(--card);
    border-left: 3px solid var(--green);
    border-radius: 0 8px 8px 0;
    margin-bottom: 12px;
  }
  .apuestas-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
  }
  .apuesta-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    text-align: center;
  }
  .apuesta-card .ap-name {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .apuesta-card .ap-value {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }
  .apuesta-card .ap-value.correct {
    color: var(--green);
    font-weight: 800;
  }
  .apuesta-card .ap-value.wrong {
    color: var(--muted);
    opacity: 0.5;
  }
  .pos-table-wrap {
    overflow-x: auto;
    border-radius: 10px;
    border: 1px solid var(--border);
  }
  .pos-table {
    border-collapse: collapse;
    width: 100%;
    min-width: 600px;
  }
  .pos-table thead th {
    background: #1a2233;
    padding: 8px 12px;
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .pos-table thead th.left { text-align: left; }
  .pos-table tbody tr { border-bottom: 1px solid var(--border); }
  .pos-table tbody tr:last-child { border-bottom: none; }
  .pos-table td {
    padding: 7px 10px;
    text-align: center;
    font-size: 12px;
    white-space: nowrap;
  }
  .pos-table td.left { text-align: left; font-weight: 600; }
  .pos-chip {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 5px;
    font-size: 11px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
  }
  .pos-chip.correct {
    background: rgba(0,200,83,0.2);
    border-color: var(--green);
    color: var(--green);
    font-weight: 700;
  }
  .pos-chip.wrong {
    opacity: 0.35;
  }

  /* LÍDERES DE LA JORNADA */
  .leaders-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 24px;
    margin-bottom: 28px;
  }
  .leaders-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 2px;
    color: var(--gold);
    margin-bottom: 4px;
  }
  .leaders-subtitle {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 16px;
  }
  .leaders-grid {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .leader-card {
    flex: 1;
    min-width: 130px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    text-align: center;
  }
  .leader-medal {
    font-size: 1.8rem;
    margin-bottom: 6px;
  }
  .leader-name {
    font-weight: 700;
    font-size: 13px;
    color: var(--text);
    margin-bottom: 6px;
  }
  .leader-pts {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    color: var(--green);
    line-height: 1;
  }
  .leader-pts-label {
    font-size: 0.9rem;
    color: var(--muted);
  }
  .leader-detail {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* HIDDEN */
  .hidden { display: none !important; }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    header { padding: 16px; flex-wrap: wrap; }
    header h1 { font-size: 1.8rem; }
    .controls { gap: 8px; }
  }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 24px;
    color: var(--muted);
    font-size: 12px;
    border-top: 1px solid var(--border);
    margin-top: 40px;
  }
</style>
</head>
<body>

<header>
  <div class="ball">⚽</div>
  <div>
    <h1>PORRA MUNDIAL <span>2026</span></h1>
    <div class="subtitle">Apuestas de los participantes · 23 porredores</div>
  </div>
</header>

<div class="container">

  <!-- STATS -->
  <div class="stats-bar" id="statsBar" style="display:none"></div>

  <!-- CONTROLS -->
  <div class="controls">
    <div id="phaseFilters" style="display:flex;flex-wrap:wrap;gap:8px;"></div>
  </div>

  <div id="content"></div>

</div>

<footer>
  PORRA MUNDIAL 2026 · Generado automáticamente desde el Excel de apuestas

    { key: 'apuestas', label: '🎲 Apuestas Especiales' },
  ];
  phases.forEach(ph => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (activePhase === ph.key ? ' active' : '');

      render();
    });
    pf.appendChild(btn);
  });
}

function sortByTime(matches) {
  return matches.slice().sort((a, b) => {
    const [ha, ma] = (SCHEDULE[a.partido]?.[1] || '99:99').split(':').map(Number);
    const [hb, mb] = (SCHEDULE[b.partido]?.[1] || '99:99').split(':').map(Number);
    const ta = ha < 10 ? ha + 24 : ha;
    const tb = hb < 10 ? hb + 24 : hb;
    return (ta * 60 + ma) - (tb * 60 + mb);
  });
}

        const b = parseBet(val);
        if (!b || !b.sign) return;
        let sign = b.sign;
        const [rt1] = m.partido.split('-').map(s=>s.trim());
        if (val.includes('·')) { const betT1 = m.bets[p].split('·')[0].split('-')[0]?.trim(); if (betT1 !== rt1) sign = b.sign==='1'?'2':b.sign==='2'?'1':'X'; }
        if (sign === actualSign) { dayScores[p].sign++; dayScores[p].total += 2; if (b.score === actual) { dayScores[p].exact++; dayScores[p].total += 3; } }

    const order = {'1':0,'X':1,'2':2};

function renderTomorrow() {
  const now = new Date();

  // Tomorrow's window = today's window shifted exactly +24h
  const windowStart = new Date(now);
  windowStart.setHours(10, 0, 0, 0);
  if (now < windowStart) windowStart.setDate(windowStart.getDate() - 1);
  // Shift +24h
  windowStart.setDate(windowStart.getDate() + 1);
  const windowEnd = new Date(windowStart);
  windowEnd.setDate(windowEnd.getDate() + 1);
  windowEnd.setHours(7, 59, 0, 0);

  const monthMap = {ene:0,feb:1,mar:2,abr:3,may:4,jun:5,jul:6,ago:7,sep:8,oct:9,nov:10,dic:11};

  const allMatchesTom = [...MATCHES, ...OCTAVOS_TODAY_MATCHES, ...CUARTOS_TODAY_MATCHES];
  const tomorrowMatches = allMatchesTom.filter(m => {
    const sched = SCHEDULE[m.partido];
    if (!sched) return false;
    const [dayStr, hora] = [sched[0], sched[1]];
    const [h, min] = hora.split(':').map(Number);
    const parts = dayStr.split(' ');
    const matchDate = new Date(2026, monthMap[parts[1]] ?? 5, parseInt(parts[0]), h, min, 0);
    return matchDate >= windowStart && matchDate < windowEnd;
  });

  const tomorrowKey = dateKey(windowStart);

  if (tomorrowMatches.length === 0) {
    return `
      <div class="today-empty">
        <div class="today-empty-icon">🗓️</div>
        <div class="today-empty-title">No hay partidos mañana</div>
        <div class="today-empty-sub">Mañana es ${tomorrowKey}. Los partidos del Mundial van del 11 de junio al 27 de junio.</div>
      </div>`;
  }

  let html = `<div class="today-header-bar"><span class="today-date-big">🗓️ ${tomorrowKey.toUpperCase()}</span><span class="today-count">${tomorrowMatches.length} partido${tomorrowMatches.length > 1 ? 's' : ''} mañana</span></div>`;

  sortByTime(tomorrowMatches).forEach(match => {
    const sched = SCHEDULE[match.partido];
    const [team1raw, team2raw] = match.partido.split('-');
    const team1 = team1raw.trim();
    const team2 = team2raw.trim();

    const byResult = {};
    const isKnockout = match.fase === '1/8';
    PARTICIPANTS.forEach(p => {
      let val = match.bets[p] || '';
      if (!val || val === 'nan') return;
      if (val.includes('·')) {
        const [betTeams, betResult] = val.split('·');
        const betT1 = betTeams.split('-')[0]?.trim();
        const betT2 = betTeams.split('-').slice(1).join('-').trim();
        const teamsMatch = (betT1 === team1 && betT2 === team2) || (betT1 === team2 && betT2 === team1);
        if (!teamsMatch) return;
        val = betResult || '';
      } else if (isKnockout) {
        return;
      }
      if (!val) return;
      if (!byResult[val]) byResult[val] = [];
      byResult[val].push(p);
    });

    const order = {'1': 0, 'X': 1, '2': 2};
    const sorted = Object.entries(byResult).sort(([a], [b]) => {
      const sa = a.split('|')[0]; const sb = b.split('|')[0];
      return (order[sa] ?? 9) - (order[sb] ?? 9);
    });

    const resultCols = sorted.map(([bet, players]) => {
      const [sign, score] = bet.split('|');
      const label = sign === '1' ? team1 : sign === '2' ? team2 : 'Empate';
      const names = players.map(p => `<span class="bettor-name">${p}</span>`).join('');
      return `
        <div class="result-col">
          <div class="result-top">
            <span class="sign sign-${sign}">${sign}</span>
            <span class="result-score">${score || ''}</span>
          </div>
          <div class="result-label">${label}</div>
          <div class="result-count">${players.length} porredor${players.length > 1 ? 'es' : ''}</div>
          <div class="bettor-list">${names}</div>
        </div>`;
    }).join('');

    html += `
      <div class="today-match-card">
        <div class="today-match-header">
          <div class="today-match-teams">
            <span class="team-name">${flag(team1)} ${team1}</span>
            <span class="vs-badge">VS</span>
            <span class="team-name">${team2} ${flag(team2)}</span>
          </div>
          <div class="today-match-meta">
            <span class="today-time">🕐 ${sched[1]} (hora española)</span>
            <span class="fase-tag">Grupo ${match.fase[0]}</span>
          </div>
        </div>
        <div class="results-grid">${resultCols}</div>
      </div>`;
  });

  return html;
}

async function loadResults() {
  try {
    const res = await fetch('/api/results');
    if (!res.ok) return;
    const data = await res.json();
    (data.matches || []).forEach(m => {
      const h = FD_TEAM_MAP[m.homeTeam.name] || m.homeTeam.name;
      const a = FD_TEAM_MAP[m.awayTeam.name] || m.awayTeam.name;
      const gh = m.score.fullTime.home;
      const ga = m.score.fullTime.away;
      if (gh === null || ga === null) return;
      RESULTS_CACHE[`${h}-${a}`] = `${gh}-${ga}`;
    });
  } catch(e) {
    console.warn('Results fetch failed:', e);
  }
}

function isMatchPlayed(partido) {
  return !!RESULTS_CACHE[partido];
}

function updateResultCells() {
  document.querySelectorAll('[data-result-partido]').forEach(el => {
    const partido = el.getAttribute('data-result-partido');
    if (!isMatchPlayed(partido)) {
      el.innerHTML = '<span class="score-pending">—</span>';
      return;
    }
    const score = RESULTS_CACHE[partido];
    el.innerHTML = score
      ? `<span class="score-badge">${score}</span>`
      : '<span class="score-pending">?</span>';
  });
}

async function refreshResults() {
  const btn = document.getElementById('refreshBtn');
  if (btn) { btn.textContent = '⏳ Cargando...'; btn.disabled = true; }
  await loadResults();
  updateResultCells();
  if (btn) {
    btn.textContent = '✅ Actualizado';
    btn.disabled = false;
    setTimeout(() => { btn.textContent = '🔄 Actualizar resultados'; }, 3000);
  }
}

function calcRanking() {
  const groupMatches = MATCHES.filter(m => GROUP_FASES.has(m.fase));
  const scores = {};
  PARTICIPANTS.forEach(p => {
    scores[p] = {
      total: 0,
      // Grupos
      g_sign: 0, g_exact: 0, g_pos: 0, g_qual16: 0,
      // Dieciseisavos
      d_match: 0, d_sign: 0, d_exact: 0, d_qual8: 0,
      // Octavos
      o_match: 0, o_sign: 0, o_exact: 0, o_qual4: 0,
      q_match: 0, q_sign: 0, q_exact: 0, q_qual_semi: 0,
      s_sign: 0, s_exact: 0, s_qual_final: 0, s_qual_third: 0,
      // Especial
      special: 0
    };
  });

  // 1) Resultados fase de grupos (1X2 + exacto)
  groupMatches.forEach(m => {
    const actual = RESULTS_CACHE[m.partido];
    if (!actual) return;
    const [g1, g2] = actual.split('-').map(Number);
    const actualSign = g1 > g2 ? '1' : g1 < g2 ? '2' : 'X';
    PARTICIPANTS.forEach(p => {
      const val = m.bets[p] || '';
      if (!val || val === 'nan') return;
      const b = parseBet(val);
      if (!b || !b.sign) return;
      if (b.sign === actualSign) {
        scores[p].g_sign++;
        scores[p].total += POINTS.sign;
        if (b.score === actual) {
          scores[p].g_exact++;
          scores[p].total += POINTS.exact;
        }
      }
    });
  });

  // 2) Resultados dieciseisavos (1X2 + exacto, misma lógica que grupos)
  if (typeof REAL_MATCHES_16 !== 'undefined' && typeof knockoutMatches1_16 !== 'undefined') {
    knockoutMatches1_16.forEach((m, idx) => {
      const real = REAL_MATCHES_16[idx];
      if (!real) return;
      const [realT1, realT2, realScore, realPens] = real;
      if (!realScore) return;

      // actualSign always based on 90min result (X if draw, even if penalties)
      const [g1_90, g2_90] = realScore.split('-').map(Number);
      let actualSign = g1_90 > g2_90 ? '1' : g1_90 < g2_90 ? '2' : 'X';

      PARTICIPANTS.forEach(p => {
        const val = m.bets[p] || '';
        if (!val || val === 'nan') return;
        const b = parseBet(val);
        if (!b || !b.isMatch) return;

        // Require teams to match real match
        const betT1 = b.teams.split('-')[0]?.trim();
        const betT2 = b.teams.split('-').slice(1).join('-').trim();
        const matchesReal = (betT1 === realT1 && betT2 === realT2) ||
                            (betT1 === realT2 && betT2 === realT1);
        if (!matchesReal) return;

        if (!actualSign) return;

        let effectiveSign = b.sign;
        if (betT1 === realT2 && betT2 === realT1) {
          effectiveSign = b.sign === '1' ? '2' : b.sign === '2' ? '1' : 'X';
        }

        if (effectiveSign === actualSign) {
          scores[p].d_sign++;
          scores[p].total += 2; // 2 pts por 1X2 en eliminatorias
          if (b.score === realScore) {
            scores[p].d_exact++;
            scores[p].total += 3; // +3 extra = 5 pts total
          }
        }
      });
    });
  }

  // 2b) Clasificados para dieciseisavos (3 pts por equipo acertado)
  if (typeof QUALIFIERS_16 !== 'undefined' && typeof QUALIFIER_BETS_16 !== 'undefined') {
    const qualSet16 = new Set(QUALIFIERS_16);
    PARTICIPANTS.forEach(p => {
      const bets = QUALIFIER_BETS_16[p] || [];
      bets.forEach(team => {
        if (team && qualSet16.has(team)) {
          scores[p].total += 3;
          scores[p].g_qual16++;
        }
      });
    });
  }

  // 3) Clasificados para octavos (5 pts por equipo acertado)
  if (typeof QUALIFIERS_8 !== 'undefined' && typeof QUALIFIER_BETS_8 !== 'undefined') {
    const qualSet8 = new Set(QUALIFIERS_8);
    PARTICIPANTS.forEach(p => {
      const bets = QUALIFIER_BETS_8[p] || [];
      bets.forEach(team => {
        if (team && qualSet8.has(team)) {
          scores[p].total += 5;
          scores[p].d_qual8++;
        }
      });
    });
  }

  // 3b) Resultados octavos (1X2 + exacto + 1 bonus eliminatoria)
  if (typeof REAL_MATCHES_8 !== 'undefined' && typeof OCTAVOS_BETS !== 'undefined') {
    REAL_MATCHES_8.forEach((real, idx) => {
      const [realT1, realT2, realScore, realPens] = real;
      if (!realScore) return;
      // actualSign always based on 90min result (X if draw, even if penalties)
      const [g1_90, g2_90] = realScore.split('-').map(Number);
      let actualSign = g1_90 > g2_90 ? '1' : g1_90 < g2_90 ? '2' : 'X';
      const bets_row = OCTAVOS_BETS[idx] || {};
      PARTICIPANTS.forEach(p => {
        const val = bets_row[p] || '';
        const b = parseBet(val);
        if (!b || !b.isMatch) return;
        const betT1 = b.teams.split('-')[0]?.trim();
        const betT2 = b.teams.split('-').slice(1).join('-').trim();
        const matchesReal = realT1 && ((betT1 === realT1 && betT2 === realT2) || (betT1 === realT2 && betT2 === realT1));
        if (!matchesReal) return;

        // +1 por acertar el partido — siempre, sin esperar resultado
        scores[p].o_match++;
        scores[p].total += 1;

        if (!actualSign) return;

        let effectiveSign = b.sign;
        if (betT1 === realT2 && betT2 === realT1) effectiveSign = b.sign === '1' ? '2' : b.sign === '2' ? '1' : 'X';
        if (effectiveSign === actualSign) {
          scores[p].o_sign++;
          scores[p].total += POINTS.sign;
          if (b.score === realScore) {
            scores[p].o_exact++;
            scores[p].total += POINTS.exact;
          }
        }
      });
    });
  }

  // 3c) Resultados cuartos (1X2 + exacto + 1 bonus eliminatoria)
  if (typeof REAL_MATCHES_4 !== 'undefined' && typeof CUARTOS_BETS !== 'undefined') {
    REAL_MATCHES_4.forEach((real, idx) => {
      const [realT1, realT2, realScore, realPens] = real;
      if (!realScore || !realT1) return;
      // actualSign always based on 90min result (X if draw, even if penalties)
      const [g1_90, g2_90] = realScore.split('-').map(Number);
      let actualSign = g1_90 > g2_90 ? '1' : g1_90 < g2_90 ? '2' : 'X';
      const bets_row = CUARTOS_BETS[idx] || {};
      PARTICIPANTS.forEach(p => {
        const val = bets_row[p] || '';
        const b = parseBet(val);
        if (!b || !b.isMatch) return;
        const betT1 = b.teams.split('-')[0]?.trim();
        const betT2 = b.teams.split('-').slice(1).join('-').trim();
        const matchesReal = (betT1 === realT1 && betT2 === realT2) || (betT1 === realT2 && betT2 === realT1);
        if (!matchesReal) return;

        if (!actualSign) return;

        let effectiveSign = b.sign;
        if (betT1 === realT2 && betT2 === realT1) effectiveSign = b.sign === '1' ? '2' : b.sign === '2' ? '1' : 'X';
        if (effectiveSign === actualSign) {
          scores[p].q_sign++;
          scores[p].total += 2;
          if (b.score === realScore) {
            scores[p].q_exact++;
            scores[p].total += 3; // +3 extra = 5 pts total
          }
        }
      });
    });
  }

  // 4) Clasificados para cuartos (6 pts por equipo acertado)
  if (QUALIFIERS_4.length > 0 && typeof QUALIFIER_BETS_4 !== 'undefined') {
    const qualSet4 = new Set(QUALIFIERS_4);
    PARTICIPANTS.forEach(p => {
      const bets = QUALIFIER_BETS_4[p] || [];
      bets.forEach(team => {
        if (team && qualSet4.has(team)) {
          scores[p].total += 6;
          scores[p].o_qual4++;
        }
      });
    });
  }

  // 3d) Resultados semifinales (2 pts 1X2, 5 pts exacto)
  if (typeof REAL_MATCHES_SEMI !== 'undefined' && typeof SEMI_BETS !== 'undefined') {
    REAL_MATCHES_SEMI.forEach((real, idx) => {
      const [realT1, realT2, realScore] = real;
      if (!realScore || !realT1) return;
      const [g1, g2] = realScore.split('-').map(Number);
      const actualSign = g1 > g2 ? '1' : g1 < g2 ? '2' : 'X';
      const bets_row = SEMI_BETS[idx] || {};
      PARTICIPANTS.forEach(p => {
        const val = bets_row[p] || '';
        const b = parseBet(val);
        if (!b || !b.isMatch) return;
        const betT1 = b.teams.split('-')[0]?.trim();
        const betT2 = b.teams.split('-').slice(1).join('-').trim();
        const matchesReal = (betT1 === realT1 && betT2 === realT2) || (betT1 === realT2 && betT2 === realT1);
        if (!matchesReal) return;
        let effectiveSign = b.sign;
        if (betT1 === realT2 && betT2 === realT1) effectiveSign = b.sign === '1' ? '2' : b.sign === '2' ? '1' : 'X';
        if (effectiveSign === actualSign) {
          scores[p].s_sign++;
          scores[p].total += 2;
          if (b.score === realScore) {
            scores[p].s_exact++;
            scores[p].total += 3; // total 5
          }
        }
      });
    });
  }

  // 3e) Clasificados para la final (10 pts)
  if (QUALIFIERS_FINAL.length > 0 && typeof QUALIFIER_BETS_FINAL !== 'undefined') {
    const qSetFinal = new Set(QUALIFIERS_FINAL);
    PARTICIPANTS.forEach(p => {
      (QUALIFIER_BETS_FINAL[p] || []).forEach(team => {
        if (team && qSetFinal.has(team)) { scores[p].total += 10; scores[p].s_qual_final++; }
      });
    });
  }

  // 3f) Clasificados para 3º-4º (8 pts)
  if (QUALIFIERS_THIRD.length > 0 && typeof QUALIFIER_BETS_THIRD !== 'undefined') {
    const qSetThird = new Set(QUALIFIERS_THIRD);
    PARTICIPANTS.forEach(p => {
      (QUALIFIER_BETS_THIRD[p] || []).forEach(team => {
        if (team && qSetThird.has(team)) { scores[p].total += 8; scores[p].s_qual_third++; }
      });
    });
  }

  // 4b) Clasificados para semifinales (8 pts por equipo acertado)
  if (QUALIFIERS_SEMI.length > 0 && typeof QUALIFIER_BETS_SEMI !== 'undefined') {
    const qualSetSemi = new Set(QUALIFIERS_SEMI);
    PARTICIPANTS.forEach(p => {
      (QUALIFIER_BETS_SEMI[p] || []).forEach(team => {
        if (team && qualSetSemi.has(team)) {
          scores[p].total += 8;
          scores[p].q_qual_semi++;
        }
      });
    });
  }

  // 5) Posiciones de grupo (se evalúan al terminar cada grupo)
  // GROUP_STANDINGS: define las posiciones reales cuando se conozcan
  if (typeof GROUP_STANDINGS !== 'undefined') {
    PARTICIPANTS.forEach(p => {
      const bets = POSITION_BETS[p] || {};
      Object.entries(bets).forEach(([slot, team]) => {
        const actual = GROUP_STANDINGS[slot];
        if (!actual) return;
        if (actual === team) {
          const posNum = parseInt(slot[0]);
          scores[p].g_pos++;
          scores[p].total += POINTS['pos' + posNum] || 2;
        }
      });
    });
  }

  // 3) Apuestas especiales (campeón, subcampeón, etc.)
  if (typeof SPECIAL_RESULTS !== 'undefined') {
    PARTICIPANTS.forEach(p => {
      const bets = SPECIAL_BETS[p] || {};
      Object.entries(SPECIAL_RESULTS).forEach(([key, actual]) => {
        if (!actual) return;
        const bet = bets[key];
        if (!bet) return;
        // Normalize for comparison (case insensitive, trim)
        if (bet.trim().toLowerCase() === actual.trim().toLowerCase()) {
          scores[p].special++;
          scores[p].total += POINTS[key] || 0;
        }
      });
    });
  }

  return scores;
}

function parseBet(val) {
  // Format: "1|2-1", "X|1-1", "2|0-2" or for knockout "TeamName·1|2-0" or just "TeamName"
  if (!val || val === 'nan') return null;
  if (val.includes('·')) {
    const [teams, bet] = val.split('·');
    const parts = bet.split('|');
    return { isMatch: true, teams, sign: parts[0], score: parts[1] || '' };
  }
  if (val.includes('|')) {
    const parts = val.split('|');
    return { sign: parts[0], score: parts[1] || '' };
  }
  // Just a team name (qualifier picks)
  return { team: val };
}

function getActualSign(partido) {
  const score = RESULTS_CACHE[partido];
  if (!score || !isMatchPlayed(partido)) return null;
  const [g1, g2] = score.split('-').map(Number);
  if (g1 > g2) return '1';
  if (g1 < g2) return '2';
  return 'X';
}

function renderBet(val, type, partido) {
  const b = parseBet(val);
  if (!b) return '<td></td>';
  
  if (b.team) {
    return `<td><span class="pick" title="${b.team}">${b.team}</span></td>`;
  }
  if (b.isMatch) {
    return `<td><div class="match-pick" title="${b.teams} ${b.sign}|${b.score}">${b.teams}<br><span class="sign sign-${b.sign}">${b.sign}</span> ${b.score}</div></td>`;
  }
  const actualSign = partido ? getActualSign(partido) : null;
  const actualScore = partido ? RESULTS_CACHE[partido] : null;
  const isExact = actualScore && isMatchPlayed(partido) && b.score === actualScore;
  const isCorrect = actualSign && b.sign === actualSign;
  const cls = isExact ? ' bet-exact' : isCorrect ? ' bet-correct' : '';
  return `<td><div class="bet${cls}"><span class="sign sign-${b.sign}">${b.sign}</span><span class="score">${b.score}</span></div></td>`;
}

function shortName(p) {
  const words = p.trim().split(/\s+/);
  if (words.length >= 2 && words[0].length > 2 && words[1].length > 2) {
    return words[0] + ' ' + words[1][0] + '.';
  }
  return p;
}

function buildTable(matches, title, faseLabel, isKnockout, isGroupMatch=false) {
  const filtered = searchTerm
    ? matches.filter(m => m.partido.toLowerCase().includes(searchTerm))
    : matches;
  
  if (filtered.length === 0) return '';

  const colClass = p => p === highlightedParticipant ? ' class="participant-header highlighted"' : ' class="participant-header"';
  const tdClass = p => p === highlightedParticipant ? ' class="highlighted-col"' : '';

  const headers = PARTICIPANTS.map(p => `<th${colClass(p)}><span>${shortName(p)}</span></th>`).join('');
  const dateHeader = (isGroupMatch) ? '<th class="datetime-col">Fecha<br>Hora (ES)</th>' : '';
  const resultHeader = (isGroupMatch) ? '<th class="result-col-header">Resultado</th>' : '';
  
  const rows = filtered.map(m => {
    const bets = PARTICIPANTS.map(p => renderBet(m.bets[p] || '', isKnockout, isGroupMatch ? m.partido : null)).join('');
    const sched = SCHEDULE[m.partido];
    const dtCell = (isGroupMatch && sched)
      ? `<td class="datetime-col"><span class="dt-date">${sched[0]}</span><span class="dt-time">${sched[1]}</span></td>`
      : (isGroupMatch ? '<td class="datetime-col"><span class="dt-date">—</span></td>' : '');
    const resultCell = isGroupMatch
      ? `<td class="result-cell" data-result-partido="${m.partido}"><span class="score-loading">...</span></td>`
      : '';
    return `
      <tr>
        <td class="match-name">
          <span class="teams">${m.partido}</span>
          ${faseLabel ? `<span class="fase-tag">${m.fase}</span>` : ''}
        </td>
        ${dtCell}
        ${resultCell}
        ${bets}
      </tr>`;
  }).join('');

  return `
    <div class="phase-section">
      ${title ? `<div class="phase-header"><span class="phase-label">${title}</span><span class="phase-count">${filtered.length} partidos</span></div>` : ''}
      <div class="table-wrapper">

              ${dateHeader}
              ${resultHeader}
              ${headers}
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

function buildTable16Real(matches) {
  const headers = PARTICIPANTS.map(p => `<th class="participant-header"><span>${shortName(p)}</span></th>`).join('');

  const rows = matches.map((m, idx) => {
    const real = REAL_MATCHES_16[idx];
    const [realT1, realT2, realScore, realPens] = real || [null, null, null, null];

    // Determine actual sign from real score
    let actualSign = null;
    let actualScore = null;
    if (realScore) {
      const [g1, g2] = realScore.split('-').map(Number);
      // If penalties, winner is determined by pens
      if (realPens) {
        const [p1, p2] = realPens.split('-').map(Number);
        actualSign = p1 > p2 ? '1' : '2';
      } else {
        actualSign = g1 > g2 ? '1' : g1 < g2 ? '2' : 'X';
      }
      actualScore = realScore;
    }

    const bets = PARTICIPANTS.map(p => {
      const val = m.bets[p] || '';
      const b = parseBet(val);
      if (!b) return '<td></td>';

      if (b.isMatch) {
        // Check if bet teams match real teams (in either order)
        const betT1 = b.teams.split('-')[0]?.trim();
        const betT2 = b.teams.split('-').slice(1).join('-').trim();
        const matchesReal = realT1 && (
          (betT1 === realT1 && betT2 === realT2) ||
          (betT1 === realT2 && betT2 === realT1)
        );

        let betClass = '';
        if (matchesReal && actualSign) {
          // Adjust sign if teams are in reverse order
          let effectiveSign = b.sign;
          if (betT1 === realT2 && betT2 === realT1) {
            effectiveSign = b.sign === '1' ? '2' : b.sign === '2' ? '1' : 'X';
          }
          const signCorrect = effectiveSign === actualSign;
          const scoreCorrect = signCorrect && b.score === actualScore;
          betClass = scoreCorrect ? 'bet-exact' : signCorrect ? 'bet-correct' : '';
        }

        return `<td><div class="bet ${betClass}">
          <div style="font-size:10px;color:var(--muted);margin-bottom:2px">${b.teams}</div>
          <span class="sign sign-${b.sign}">${b.sign}</span>
          <span class="score">${b.score}</span>
        </div></td>`;
      }

      return '<td></td>';
    }).join('');

    // Real match cell
    let realMatchCell = '<td class="match-name">—</td>';
    let realResultCell = '<td class="result-cell"><span class="score-pending">—</span></td>';
    if (real && realT1) {
      realMatchCell = `<td class="match-name" style="white-space:nowrap;font-size:12px">${flag(realT1)} ${realT1} - ${realT2} ${flag(realT2)}</td>`;
      if (realScore) {
        realResultCell = `<td class="result-cell">
          <span class="score-badge">${realScore}</span>
          ${realPens ? `<div style="font-size:10px;color:var(--gold)">pen. ${realPens}</div>` : ''}
        </td>`;
      } else {
        realResultCell = `<td class="result-cell"><span style="color:var(--gold);font-size:11px">Pendiente</span></td>`;
      }
    }

    return `<tr>
      <td class="match-name"><span class="teams">${m.partido}</span><span class="fase-tag">${m.fase}</span></td>
      ${realMatchCell}
      ${realResultCell}
      ${bets}
    </tr>`;
  }).join('');

  return `
    <div class="phase-section">
      <div class="phase-header"><span class="phase-label">⚔️ Partidos de Dieciseisavos</span><span class="phase-count">${matches.length} partidos</span></div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th class="partido-col">Partido</th>
              <th class="partido-col">Partido Real</th>
              <th class="result-col-header">Resultado</th>
              ${headers}
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

  const rows = REAL_MATCHES_8.map(([realT1, realT2, realScore, realPens, date, time], idx) => {
    const bets_row = OCTAVOS_BETS[idx] || {};

    let actualSign = null, actualScore = null;
    if (realScore) {
      // Sign based on 90min result only (X if draw, even with penalties)
      const [g1, g2] = realScore.split('-').map(Number);
      actualSign = g1 > g2 ? '1' : g1 < g2 ? '2' : 'X';
      actualScore = realScore;
    }

    const betCells = PARTICIPANTS.map(p => {
      const val = bets_row[p] || '';
      const b = parseBet(val);
      if (!b || !b.isMatch) return '<td></td>';

      const betT1 = b.teams.split('-')[0]?.trim();
      const betT2 = b.teams.split('-').slice(1).join('-').trim();
      const matchesReal = realT1 && (
        (betT1 === realT1 && betT2 === realT2) ||
        (betT1 === realT2 && betT2 === realT1)
      );

      let betClass = '';
      if (matchesReal && actualSign) {
        let effectiveSign = b.sign;
        if (betT1 === realT2 && betT2 === realT1) {
          effectiveSign = b.sign === '1' ? '2' : b.sign === '2' ? '1' : 'X';
        }
        const signCorrect = effectiveSign === actualSign;
        const scoreCorrect = signCorrect && b.score === actualScore;
        betClass = scoreCorrect ? 'bet-exact' : signCorrect ? 'bet-correct' : '';
      }

      return `<td><div class="bet ${betClass}">
        <div style="font-size:10px;color:var(--muted);margin-bottom:2px">${b.teams}</div>
        <span class="sign sign-${b.sign}">${b.sign}</span>
        <span class="score">${b.score}</span>
      </div></td>`;
    }).join('');

    // Real match cell
    const matchStr = `${flag(realT1)} ${realT1} - ${realT2} ${flag(realT2)}`;
    let resultStr;
    if (realScore) {
      resultStr = `<span class="score-badge">${realScore}</span>`;
      if (realPens) resultStr += `<div style="font-size:10px;color:var(--gold)">pen. ${realPens}</div>`;
    } else {
      resultStr = `<span style="color:var(--gold);font-size:11px">🕐 ${time}</span>`;
    }

    return `<tr>
      <td class="match-name" style="white-space:nowrap;font-size:12px">
        ${matchStr}
        <div style="font-size:10px;color:var(--muted);margin-top:2px">${date} ${time}</div>
      </td>
      <td class="result-cell">${resultStr}</td>
      ${betCells}
    </tr>`;
  }).join('');

  return `
    <div class="phase-section">
      <div class="phase-header"><span class="phase-label">🏆 Octavos de Final</span><span class="phase-count">8 partidos</span></div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th class="partido-col">Partido</th>
              <th class="result-col-header">Resultado</th>
              ${headers}
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

function buildTableKnockout(realMatches, betsRows, title) {
  const headers = PARTICIPANTS.map(p => `<th class="participant-header"><span>${shortName(p)}</span></th>`).join('');

  const rows = realMatches.map(([realT1, realT2, realScore, realPens, date, time], idx) => {
    const bets_row = betsRows[idx] || {};
    let actualSign = null, actualScore = null;
    if (realScore) {
      const [g1, g2] = realScore.split('-').map(Number);
      actualSign = g1 > g2 ? '1' : g1 < g2 ? '2' : 'X';
      actualScore = realScore;
    }
    const betCells = PARTICIPANTS.map(p => {
      const val = bets_row[p] || '';
      const b = parseBet(val);
      if (!b || !b.isMatch) return '<td></td>';
      const betT1 = b.teams.split('-')[0]?.trim();
      const betT2 = b.teams.split('-').slice(1).join('-').trim();
      const matchesReal = realT1 && ((betT1 === realT1 && betT2 === realT2) || (betT1 === realT2 && betT2 === realT1));
      let betClass = '';
      if (matchesReal && actualSign) {
        let effectiveSign = b.sign;
        if (betT1 === realT2 && betT2 === realT1) effectiveSign = b.sign === '1' ? '2' : b.sign === '2' ? '1' : 'X';
        const signCorrect = effectiveSign === actualSign;
        betClass = (signCorrect && b.score === actualScore) ? 'bet-exact' : signCorrect ? 'bet-correct' : '';
      }
      return `<td><div class="bet ${betClass}">
        <div style="font-size:10px;color:var(--muted);margin-bottom:2px">${b.teams}</div>
        <span class="sign sign-${b.sign}">${b.sign}</span>
        <span class="score">${b.score}</span>
      </div></td>`;
    }).join('');

    let matchCell, resultCell;
    if (realT1) {
      const t2display = realT2 || 'Por determinar';
      matchCell = `<td class="match-name" style="white-space:nowrap;font-size:12px">${flag(realT1)} ${realT1} - ${t2display}${realT2 ? ' ' + flag(realT2) : ''}<div style="font-size:10px;color:var(--muted);margin-top:2px">${date||''} ${time||''}</div></td>`;
      resultCell = realScore
        ? `<td class="result-cell"><span class="score-badge">${realScore}</span>${realPens ? `<div style="font-size:10px;color:var(--gold)">pen. ${realPens}</div>` : ''}</td>`
        : `<td class="result-cell"><span style="color:var(--gold);font-size:11px">🕐 ${time||'Pendiente'}</span></td>`;
    } else {
      matchCell = `<td class="match-name" style="color:var(--muted);font-style:italic">Por determinar${date ? ` · ${date} ${time}` : ''}</td>`;
      resultCell = `<td class="result-cell"><span style="color:var(--gold);font-size:11px">${time ? `🕐 ${time}` : '—'}</span></td>`;
    }
    return `<tr style="border-bottom:1px solid var(--border)">${matchCell}${resultCell}${betCells}</tr>`;
  }).join('');

  return `
    <div class="phase-section">
      <div class="phase-header"><span class="phase-label">${title}</span></div>
      <div class="table-wrapper"><table>
        <thead><tr>
          <th class="partido-col">Partido</th>
          <th class="result-col-header">Resultado</th>
          ${headers}
        </tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>`;
}

function render() {
  buildPhaseFilters();
  const content = document.getElementById('content');
  setTimeout(updateResultCells, 50);

  if (activePhase === 'groups') {
    const grpLetters = Object.keys(groups).sort();
    let html = buildGroupTabs();

    if (searchTerm) {
      // Show all groups filtered
      grpLetters.forEach(g => {
        html += buildTable(groups[g], `Grupo ${g}`, false, false, true);
      });
    } else {
      html += buildTable(groups[activeGroup] || [], `Grupo ${activeGroup}`, false, false, true);
    }
    content.innerHTML = html;
  } else if (activePhase === '1/16') {
    let html = '';
    if (picks1_16.length > 0) {
      html += buildTable(picks1_16, '🎯 Pronóstico de clasificados (32 puestos)', true, false);
    }
    if (knockoutMatches1_16.length > 0) {
      html += buildTable16Real(knockoutMatches1_16);
    }
    content.innerHTML = html;
  } else if (activePhase === 'today') {
    content.innerHTML = renderToday();
  } else if (activePhase === '1/4') {
    content.innerHTML = buildTable4Real();
  } else if (activePhase === '1/2') {
    content.innerHTML = buildTableSemiReal();
  } else if (activePhase === '3rd') {
    content.innerHTML = buildTableKnockout([REAL_MATCH_THIRD], [THIRD_BETS[0]], '🥉 3º y 4º Puesto');
  } else if (activePhase === 'final') {
    content.innerHTML = buildTableKnockout([REAL_MATCH_FINAL], [FINAL_BETS[0]], '🏆 Final');
  } else if (activePhase === 'ranking') {
    content.innerHTML = renderRanking();
  } else if (activePhase === 'apuestas') {
    content.innerHTML = renderApuestas();
  } else if (activePhase === '1/8') {
    content.innerHTML = buildTable8Real();
  }
}
